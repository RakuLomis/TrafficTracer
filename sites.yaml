global:
  mihomo:
    binary: ../mihomo-core/mihomo-traffictracer
    config: mihomo-configs/config.yaml
    api: "http://127.0.0.1:9099"
  chrome:
    binary: google-chrome
    user_data_dir: chrome-profile
    headless: true
  network:
    tun_interface: utun
    phys_interface: wlp2s0
  output:
    base_dir: /data/datasets/ttTest

sites:
